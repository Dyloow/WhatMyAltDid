services:
  migrate:
    image: ghcr.io/dyloow/whatmyaltdid:migrator-latest
    restart: "no"
    command: ["pnpm", "prisma", "migrate", "deploy"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wmad}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-wmad}?sslmode=disable
    networks:
      - internal

  app:
    image: ghcr.io/dyloow/whatmyaltdid:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wmad}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-wmad}?sslmode=disable
      REDIS_URL: redis://redis:6379
      NEXTAUTH_URL: https://whatmyaltdid.com
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_SECRET: ${NEXTAUTH_SECRET}
      BATTLENET_CLIENT_ID: ${BATTLENET_CLIENT_ID}
      BATTLENET_CLIENT_SECRET: ${BATTLENET_CLIENT_SECRET}
      NODE_ENV: production
    networks:
      - proxy
      - internal
    labels:
      - "traefik.enable=true"
      # Redirect HTTP → HTTPS
      - "traefik.http.routers.whatmyaltdid-http.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.whatmyaltdid-http.entrypoints=web"
      - "traefik.http.routers.whatmyaltdid-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"
      # HTTPS
      - "traefik.http.routers.whatmyaltdid.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.whatmyaltdid.entrypoints=websecure"
      - "traefik.http.routers.whatmyaltdid.tls.certresolver=letsencrypt"
      - "traefik.http.services.whatmyaltdid.loadbalancer.server.port=3000"
      - "traefik.http.services.whatmyaltdid.loadbalancer.healthcheck.path=/api/health"
      - "traefik.http.services.whatmyaltdid.loadbalancer.healthcheck.interval=10s"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wmad}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-wmad}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wmad} -d ${POSTGRES_DB:-wmad}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  proxy:
    external: true
  internal:
    driver: bridge

volumes:
  postgres_data:
  redis_data: