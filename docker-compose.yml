services:
  app:
    image: ghcr.io/dyloow/whatmyaltdid:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NEXTAUTH_URL: https://whatmyaltdid.com
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      BATTLENET_CLIENT_ID: ${BATTLENET_CLIENT_ID}
      BATTLENET_CLIENT_SECRET: ${BATTLENET_CLIENT_SECRET}
      NODE_ENV: production
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      # Redirect HTTP → HTTPS
      - "traefik.http.routers.whatmyaltdid-http.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.whatmyaltdid-http.entrypoints=web"
      - "traefik.http.routers.whatmyaltdid-http.middlewares=redirect-https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"
      # HTTPS
      - "traefik.http.routers.whatmyaltdid.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.whatmyaltdid.entrypoints=websecure"
      - "traefik.http.routers.whatmyaltdid.tls.certresolver=letsencrypt"
      - "traefik.http.services.whatmyaltdid.loadbalancer.server.port=3000"
      # Healthcheck Traefik — retire le container si unhealthy
      - "traefik.http.services.whatmyaltdid.loadbalancer.healthcheck.path=/api/health"
      - "traefik.http.services.whatmyaltdid.loadbalancer.healthcheck.interval=10s"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5

networks:
  proxy:
    external: true