name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_PASSWORD,NEXTAUTH_SECRET,BATTLENET_CLIENT_ID,BATTLENET_CLIENT_SECRET,APP_DOMAIN
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,NEXTAUTH_SECRET,BATTLENET_CLIENT_ID,BATTLENET_CLIENT_SECRET,APP_DOMAIN
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Setup Image Tag
            export IMAGE_TAG=sha-$(echo "${{ github.sha }}" | cut -c1-7)
            
            # Login GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Create or update .env file on server for docker-compose to read
            cat <<EOF > .env
            IMAGE_TAG=${IMAGE_TAG}
            POSTGRES_USER=${POSTGRES_USER:-wmad}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=${POSTGRES_DB:-wmad}
            NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
            BATTLENET_CLIENT_ID=${BATTLENET_CLIENT_ID}
            BATTLENET_CLIENT_SECRET=${BATTLENET_CLIENT_SECRET}
            APP_DOMAIN=${APP_DOMAIN}
            EOF

            # Pull and Restart everything
            docker compose pull
            docker compose up -d --wait || {
              echo "=== CONTAINER LOGS ==="
              docker compose logs --tail=100
              exit 1
            }

            # Cleanup
            docker image prune -f
