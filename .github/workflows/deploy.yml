name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (runner)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: ghcr.io/dyloow/whatmyaltdid:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push (migrator)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          push: true
          tags: ghcr.io/dyloow/whatmyaltdid:migrator-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy on server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync docker-compose.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            if [ -z "${{ secrets.POSTGRES_PASSWORD }}" ]; then
              echo "ERROR: POSTGRES_PASSWORD secret is missing!"
              exit 1
            fi

            if [ -z "${{ secrets.NEXTAUTH_SECRET }}" ]; then
              echo "ERROR: NEXTAUTH_SECRET secret is missing! Run: openssl rand -base64 32"
              exit 1
            fi

            if [ -z "${{ secrets.BATTLENET_CLIENT_ID }}" ]; then
              echo "ERROR: BATTLENET_CLIENT_ID secret is missing!"
              exit 1
            fi

            if [ -z "${{ secrets.BATTLENET_CLIENT_SECRET }}" ]; then
              echo "ERROR: BATTLENET_CLIENT_SECRET secret is missing!"
              exit 1
            fi

            if [ -z "${{ secrets.APP_DOMAIN }}" ]; then
              echo "ERROR: APP_DOMAIN secret is missing!"
              exit 1
            fi

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            cat <<EOF > .env
            POSTGRES_USER=${{ secrets.POSTGRES_USER || 'wmad' }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB || 'wmad' }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            BATTLENET_CLIENT_ID=${{ secrets.BATTLENET_CLIENT_ID }}
            BATTLENET_CLIENT_SECRET=${{ secrets.BATTLENET_CLIENT_SECRET }}
            APP_DOMAIN=${{ secrets.APP_DOMAIN }}
            EOF

            docker compose pull
            docker compose up -d --wait || {
              echo "=== DEBUG: DOCKER COMPOSE LOGS ==="
              docker compose logs --tail=50
              exit 1
            }

            docker image prune -f
