name: Generate BiS Data

on:
  schedule:
    # Tous les jours à 6h00 UTC (correspond au reset serveur EU)
    - cron: "0 6 * * *"
  workflow_dispatch: # Permet de lancer manuellement

jobs:
  generate-bis-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120 # 2 heures max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate BiS data for all specs
        run: npx tsx scripts/generate-all-bis.ts
        env:
          BATTLENET_CLIENT_ID: ${{ secrets.BATTLENET_CLIENT_ID }}
          BATTLENET_CLIENT_SECRET: ${{ secrets.BATTLENET_CLIENT_SECRET }}
          NODE_ENV: production

      - name: Commit and push generated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/bis/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update BiS data [skip ci]" && git push)
